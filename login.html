<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A template project for HTML CSS" />
    <meta name="author" content="Emir Sapmaz" />
    <title>Biletco</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
      integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header>
      <a href="index.html"><h1>Biletco</h1></a>
      <div class="right-header">
        <ul>
          <li><a href="login.html">Login</a></li>
          <li><a href="register.html">Register</a></li>
        </ul>
      </div>
    </header>
    <div class="container">
      <form id="loginForm">
        <div class="input-wrap">
          <label for="email">Email</label>
          <input
            style="padding-right: 40px"
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            required
          />
          <i class="fa-solid fa-envelope"></i>
        </div>
        <label for="password">Password</label>
        <div class="input-wrap">
          <input
            style="padding-right: 40px"
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            required
          />
          <i class="fa-solid fa-lock"></i>
        </div>
        <br /><br />
        <button class="pulse" type="submit">Login</button>
      </form>
      <br />
      <a href="forgetPassword.html">Forget password?</a>
    </div>
    <script>
      const validUser = { email: "user@hotmail.com", password: "biletco" };
      const validOrganizer = {
        email: "organizer@hotmail.com",
        password: "biletco",
      };
      const validAdmin = { email: "admin@hotmail.com", password: "biletco" };

      document
        .getElementById("loginForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;

          // user
          if (email === validUser.email && password === validUser.password) {
            window.location.href = "MainPage.html";
            return;
          }
          // organizer
          if (
            email === validOrganizer.email &&
            password === validOrganizer.password
          ) {
            window.location.href = "mainOrganizer.html";
            return;
          }
          //admin
          if (email === validAdmin.email && password === validAdmin.password) {
            window.location.href = "AdminPage.html";
            return;
          }
          alert("Invalid email or password.");
        });
    </script>
  </body>
</html>
