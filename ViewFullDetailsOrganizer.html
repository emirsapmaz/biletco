<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Page</title>
    <link rel="stylesheet" href="DetailsPage.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
      integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header>
      <a href="mainOrganizer.html"><h1>Biletco</h1></a>
      <div class="search-container">
        <input
          type="text"
          id="search"
          placeholder="Search by event name"
          onkeyup="searchEvent()"
        />
        <i class="fa-solid fa-magnifying-glass"></i>
      </div>
      <div class="right-header">
        <ul>
          <li>
            <p style="color: white; text-align: center;"><strong>Welcome Ahmet</strong></p>
          </li>
        </ul>
      </div>
    </header>
    <main>
      <div class="image-container">
        <img src="images/konser.jpg" alt="Event Image" />
      </div>

      <div class="event-container">
        <div class="event-details">
          <h2>Event Name</h2>
          <p>
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Esse
            ratione tempora repellat ipsum, tenetur veritatis.
          </p>

          <div class="form-group">
            <div class="form-item">
              <label for="category">Category</label>
              <select id="category" name="category">
                <option value="general">General</option>
                <option value="vip">VIP</option>
              </select>
            </div>
            <div class="form-item">
              <label for="ticket-number">Number of Tickets</label>
              <input id="ticket-number" type="number" min="1" value="1" />
            </div>
          </div>

          <p><strong>Price:</strong> <span id="price">100</span> TL</p>

          <button class="btn" onclick="showModal()">Get Your Ticket!</button>
        </div>
      </div>
    </main>

    <div id="ticketModal" class="modal">
      <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2>Your ticket has been successfully purchased!</h2>
        <p>Your ticket number is xxxx</p>
      </div>
    </div>

    <script>
      function showModal() {
        document.getElementById("ticketModal").style.display = "block";
      }

      function closeModal() {
        document.getElementById("ticketModal").style.display = "none";
      }
      window.onclick = function (event) {
        if (event.target == document.getElementById("ticketModal")) {
          closeModal();
        }
      };

      const ticketPrice = 100;

      const ticketInput = document.getElementById("ticket-number");
      const priceDisplay = document.getElementById("price");

      ticketInput.addEventListener("input", () => {
        const ticketCount = ticketInput.value;
        const totalPrice = ticketCount * ticketPrice;
        priceDisplay.textContent = totalPrice;
      });
    </script>
  </body>
</html>
