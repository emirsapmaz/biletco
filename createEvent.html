<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A template project for HTML CSS" />
    <meta name="author" content="Emir Sapmaz" />
    <title>Biletco</title>
    <link rel="stylesheet" href="style.css">
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
</head>
<body>
    <header>
        <a href="mainOrganizer.html"><h1>Biletco</h1></a>
            <div class="right-header">
                <ul>
                    <li><p style="color: white; text-align: center;"><strong>Welcome Ahmet</strong></p></li>
                    <li><button type="button" onclick="window.location.href='createEvent.html'">Create Event</button></a></li>   
                    <li><button type="button" onclick="window.location.href='manageEvents.html'">Manage Event</button></a></li>   
                    <li><button type="button" onclick="window.location.href='index.html'" id="logout">Log out</button></li>   

                </ul>
            </div>
    </header>
    <div class="container" style="margin-top: 2vh;">
        <form action="mainOrganizer.html" method="post">
            <div class="input-wrap wid">
                <label for="event-name">Event Name</label>
                <input type="text" id="eventName" name="eventName" placeholder="Enter the event name" required>
            </div>
            <div class="input-wrap wid">
                <label for="eventLocation">Event Location</label>
                <input type="text" id="eventLocation" name="eventLocation" placeholder="Enter event location" required>
            </div>
            <div class="input-wrap wid">
                <label for="eventDate">Event Date</label>
                <input type="date" id="eventDate" name="eventDate" placeholder="Enter event date" required>
            </div>
            <div class="input-wrap wid">
                <label for="capacity">Capacity</label>
                <input type="number" id="capacity" name="capacity" required min="1" placeholder="Enter event capacity" required>
            </div>
            <div class="input-wrap wid">
                <label for="price">Price</label>
            <input type="number" id="price" name="price" required min="0" placeholder="Enter the price">
            </div>
            <div class="input-wrap ">
                <label for="category">Category</label>
            <select id="category" name="category" style="padding: 10px; margin-top:10px ; width: 20vw;" required>
                <option value="">Select a category</option>
                <option value="Music">Music</option>
                <option value="Art">Art</option>
                <option value="Sports">Sports</option>
                <option value="Workshop">Workshop</option>
            </select>
            </div>
            <div class="input-wrap">
                <label for="eventDescription">Event Description</label>
            <textarea style="width: 20vw; padding: 10px; font-size: 0.9em;" id="eventDescription" name="eventDescription"  required placeholder="Enter a event description"></textarea>
            </div>
            <br>
            <button class="pulse" type="submit">Create Event</button>
        </form>
    </div>
    
</body>
</html>
