<html lang="en">
<head>

    <title>Biletco</title>
    <link rel="stylesheet" href="manageEvents.css">
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="

  <header>
    <a href="index.html"><h1>Biletco</h1></a>
    <div class="right-header">
        <ul>
            <li><a href="createEvent.html"><button class="hover-button">Create Event</button></a></li>   
            <li><p style="color: white;"><strong>Welcome Ahmet</strong></p></li>
        </ul>
    </div>
</header>
</head>
<body>
    
    <table class="event-table">
        <thead>
            <tr>
                <th>Event Name</th>
                <th>Location</th>
                <th>Date</th>
                <th>Category</th>
                <th>Manage Details</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Music Festival</td>
                <td>New York</td>
                <td>2024-06-25</td>
                <td>Music</td>
                <td><button class="manage-btn">Manage</button></td>
                <td class="active">Active</td>
            </tr>
            <tr>
                <td>Tech Conference</td>
                <td>San Francisco</td>
                <td>2024-05-15</td>
                <td>Technology</td>
                <td><button class="manage-btn">Manage</button></td>
                <td class="expired">Expired</td>
            </tr>
            <tr>
                <td>Art Exhibition</td>
                <td>Paris</td>
                <td>2024-03-10</td>
                <td>Art</td>
                <td><button class="manage-btn">Manage</button></td>
                <td class="active">Active</td>
            </tr>
            <tr>
                <td>Boxing Match</td>
                <td>Milano</td>
                <td>2025-03-18</td>
                <td>Sport</td>
                <td><button class="manage-btn">Manage</button></td>
                <td class="pending">Pending</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
