<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=,, initial-scale=1.0">
    <meta name="description" content="A template project for HTML CSS" />
    <meta name="author" content="Emir Sapmaz" />
    <title>Biletco</title>
    <link rel="stylesheet" href="style.css">
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
</head>
<body>
    <header>
        <a href="index.html"><h1>Biletco</h1></a>
        <div class="right-header">
            <ul>
                <li><a href="login.html">Login</a></li>
                <li><a href="register.html">Register</a></li>
            </ul>
        </div>
    </header>

    <div class="container" style="margin-top: 2vh;">
        <form action="login.html" method="post">
            <div class="input-wrap">
                <label for="firstname">First name</label>
                <input type="text" id="firstname" name="firstname" placeholder="Enter first name" required>
            </div>
            <div class="input-wrap">
                <label for="lastname">Last name</label>
                <input type="text" id="lastname" name="lastname" placeholder="Enter last name" required>
            </div>
            <div class="input-wrap">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter email" required>
            </div>
            <div class="input-wrap">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required>
            </div>
            <div class="input-wrap">
                <label for="tax">Tax Payer Number</label>
                <input type="text" id="tax" name="tax" placeholder="Enter tax payer number" required>
            </div>
            <div class="input-wrap">
                <label for="gender">Gender</label>
                <div>
                    <input type="radio" id="gender" name="gender" value="Male" > Male
                </div>
                <div>
                    <input type="radio" id="gender" name="gender" value="Female" > Female
                </div>
            </div>
            <div class="input-wrap">
                <label for="date">Birth Date</label>
                <input type="date" id="date" name="date"  required>
            </div>
            <br>
            <button class="pulse" type="submit">Login</button>
        </form>
    </div>
    
</body>
</html>
