<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=,, initial-scale=1.0">
    <meta name="description" content="A template project for HTML CSS" />
    <meta name="author" content="Emir Sapmaz" />
    <title>Biletco</title>
    <link rel="stylesheet" href="style.css">
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
</head>
<body>
    <header>
        <a href="index.html"><h1>Biletco</h1></a>
        <div class="right-header">
            <ul>
                <li><a href="login.html">Login</a></li>
                <li><a href="register.html">Register</a></li>
            </ul>
        </div>
    </header>

    <div class="container">
        <form id="loginForm" method="post" action="login.html" onsubmit="handleFormSubmit(event)" >
          <div class="input-wrap">
            <label for="email">Email</label>
            <input
              style="padding-right: 40px"
              type="email"
              id="email"
              name="email"
              placeholder="Enter your email"
              required
            />
            <i class="fa-solid fa-envelope"></i>
          </div>
          <label for="password">New password</label>
          <div class="input-wrap">
            <input
              style="padding-right: 40px"
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              required
            />
            <i class="fa-solid fa-lock"></i>
          </div>
          <br /><br />
          <button class="pulse" type="submit">Change password</button>
        </form>
      </div>
    <div id="ticketModal" class="modal" style="display: none">
      <div class="modal-content">
        <span class="close" onclick="closeModal(); window.location.href='login.html'">&times;</span>
        <h2 style="color: green;">You have successfully changed your password!</h2>
      </div>
    </div>

    <script>
      function handleFormSubmit(event) {
        event.preventDefault(); 

        showModal();
      }

      function showModal() {
        const modal = document.getElementById("ticketModal");
        modal.style.display = "block";
      }

      function closeModal() {
        const modal = document.getElementById("ticketModal");
        modal.style.display = "none";
      }

      window.onclick = function (event) {
        const modal = document.getElementById("ticketModal");
        if (event.target == modal) {
          closeModal();
        }
      };
    </script>
</body>
</html>
