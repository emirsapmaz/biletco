<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A template project for HTML CSS" />
    <meta name="author" content="Emir Sapmaz" />
    <title>Biletco</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
      integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header>
      <a href="mainOrganizer.html"><h1>Biletco</h1></a>
      <div class="right-header">
        <ul>
          <li>
            <button
              type="button"
              onclick="window.location.href='createEvent.html'"
            >
              Create Event
            </button>
          </li>
          <li>
            <button
              type="button"
              onclick="window.location.href='manageEvents.html'"
            >
              Manage Event
            </button>
          </li>
          <li>
            <p style="color: white"><strong>Welcome Ahmet</strong></p>
          </li>
        </ul>
      </div>
    </header>
    <div class="container" style="margin-top: 2vh">
      <form id="eventForm" onsubmit="handleFormSubmit(event)">
        <div class="input-wrap">
          <label for="event-name">Event Name</label>
          <input
            type="text"
            id="eventName"
            name="eventName"
            placeholder="Enter the event name"
            required
          />
        </div>
        <div class="input-wrap">
          <label for="eventLocation">Event Location</label>
          <input
            type="text"
            id="eventLocation"
            name="eventLocation"
            placeholder="Enter event location"
            required
          />
        </div>
        <div class="input-wrap">
          <label for="eventDate">Event Date</label>
          <input
            type="date"
            id="eventDate"
            name="eventDate"
            placeholder="Enter event date"
            required
          />
        </div>
        <div class="input-wrap">
          <label for="capacity">Capacity</label>
          <input
            type="number"
            id="capacity"
            name="capacity"
            required
            min="1"
            placeholder="Enter event capacity"
          />
        </div>
        <div class="input-wrap">
          <label for="price">Price</label>
          <input
            type="number"
            id="price"
            name="price"
            required
            min="0"
            placeholder="Enter the price"
          />
        </div>
        <div class="input-wrap">
          <label for="category">Category</label>
          <select
            id="category"
            name="category"
            style="padding: 10px; margin-top: 10px; width: 20vw"
            required
          >
            <option value="">Select a category</option>
            <option value="Music">Music</option>
            <option value="Art">Art</option>
            <option value="Sports">Sports</option>
            <option value="Workshop">Workshop</option>
          </select>
        </div>
        <div class="input-wrap">
          <label for="eventDescription">Event Description</label>
          <textarea
            style="width: 20vw"
            id="eventDescription"
            name="eventDescription"
            required
            placeholder="Enter a event description"
          ></textarea>
        </div>
        <br />
        <button class="pulse" type="submit">Update Event</button>
      </form>
    </div>

    <div id="ticketModal" class="modal" style="display: none">
      <div class="modal-content">
        <span class="close" onclick="closeModal(); window.location.href='manageEvents.html'">&times;</span>
        <h2 style="color: green;">Event has been successfully updated!</h2>
      </div>
    </div>

    <script>
      function handleFormSubmit(event) {
        event.preventDefault(); 

        showModal();
      }

      function showModal() {
        const modal = document.getElementById("ticketModal");
        modal.style.display = "block";
      }

      function closeModal() {
        const modal = document.getElementById("ticketModal");
        modal.style.display = "none";
      }

      window.onclick = function (event) {
        const modal = document.getElementById("ticketModal");
        if (event.target == modal) {
          closeModal();
        }
      };
    </script>
  </body>
</html>
